<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日新闻简报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        
        .date {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .update-info {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 10px;
        }
        
        .category-section {
            margin-bottom: 50px;
        }
        
        .category-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid;
            position: relative;
        }
        
        .category-macro .category-title { border-color: #3498db; }
        .category-ai .category-title { border-color: #9b59b6; }
        .category-tech .category-title { border-color: #2ecc71; }
        .category-energy .category-title { border-color: #f39c12; }
        .category-space .category-title { border-color: #e74c3c; }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .news-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
            position: relative;
            overflow: hidden;
        }
        
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }
        
        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
        }
        
        .category-macro .news-card::before { background: #3498db; }
        .category-ai .news-card::before { background: #9b59b6; }
        .category-tech .news-card::before { background: #2ecc71; }
        .category-energy .news-card::before { background: #f39c12; }
        .category-space .news-card::before { background: #e74c3c; }
        
        .news-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .news-title a {
            color: #2c3e50;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .news-title a:hover {
            color: #3498db;
        }
        
        .news-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .news-time, .news-source {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .category-tag {
            background: #ecf0f1;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .news-summary {
            margin-bottom: 20px;
            line-height: 1.7;
            color: #34495e;
        }
        
        .news-focus {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
        }
        
        .news-focus strong {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        
        .news-link {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .news-link:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        
        .error {
            background: #ffeaea;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin: 40px 0;
        }
        
        .error h3 {
            color: #e74c3c;
            margin-bottom: 15px;
        }
        
        .stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .stats h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #3498db;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .category-title {
                font-size: 1.5rem;
            }
        }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📰 每日新闻简报</h1>
        <div class="date" id="current-date">加载中...</div>
        <div class="update-info">
            最后更新: <span id="update-time">-</span>
        </div>
    </div>
    
    <div id="stats-container"></div>
    
    <div id="news-container">
        <p style="text-align: center; padding: 40px;">正在加载新闻数据...</p>
    </div>
    
    <div class="footer">
        <p>新闻简报系统 | 基于真实新闻数据生成 | 每日自动更新</p>
    </div>

    <script>
        // 加载新闻数据
        async function loadNewsData() {
            try {
                const response = await fetch('news.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('加载新闻数据失败:', error);
                throw error;
            }
        }

        // 按分类分组新闻
        function groupNewsByCategory(newsArray) {
            const categories = {
                '宏观': [],
                'AI': [],
                '科技': [],
                '新能源': [],
                '商业航天': []
            };
            
            if (!newsArray) return categories;
            
            newsArray.forEach(news => {
                const category = news.category;
                if (categories[category]) {
                    categories[category].push(news);
                } else {
                    categories['宏观'].push(news);
                }
            });
            
            return categories;
        }

        // 创建新闻卡片
        function createNewsCard(news) {
            if (!news) return '';
            
            return `
                <div class="news-card">
                    <h3 class="news-title">
                        <a href="${news.url || '#'}" target="_blank" rel="noopener noreferrer">
                            ${news.title || '无标题'}
                        </a>
                    </h3>
                    
                    <div class="news-meta">
                        <span class="news-time">${news.time || '未知时间'}</span>
                        <span class="news-source">${news.source || '未知来源'}</span>
                        <span class="category-tag">${news.category || '未分类'}</span>
                    </div>
                    
                    <div class="news-summary">
                        ${news.summary || '无摘要'}
                    </div>
                    
                    <div class="news-focus">
                        <strong>📌 关注点</strong>
                        ${news.focus || '无关注点说明'}
                    </div>
                    
                    <a href="${news.url || '#'}" class="news-link" target="_blank" rel="noopener noreferrer">
                        阅读原文
                    </a>
                </div>
            `;
        }

        // 创建分类区块
        function createCategorySection(categoryName, newsArray) {
            if (!newsArray || newsArray.length === 0) return '';
            
            const categoryClass = {
                '宏观': 'category-macro',
                'AI': 'category-ai',
                '科技': 'category-tech',
                '新能源': 'category-energy',
                '商业航天': 'category-space'
            }[categoryName] || 'category-macro';
            
            const newsCards = newsArray.map(news => createNewsCard(news)).join('');
            
            return `
                <div class="category-section ${categoryClass}">
                    <h2 class="category-title">${categoryName} <span style="font-size: 1rem; color: #7f8c8d;">(${newsArray.length}条)</span></h2>
                    <div class="news-grid">
                        ${newsCards}
                    </div>
                </div>
            `;
        }

        // 创建统计信息
        function createStats(data) {
            if (!data || !data.news || !Array.isArray(data.news)) return '';
            
            const totalNews = data.news.length;
            const categories = {};
            
            data.news.forEach(news => {
                const category = news.category || '未分类';
                categories[category] = (categories[category] || 0) + 1;
            });
            
            const categoryItems = Object.entries(categories).map(([category, count]) => `
                <div class="stat-item">
                    <div class="stat-value">${count}</div>
                    <div class="stat-label">${category}</div>
                </div>
            `).join('');
            
            return `
                <div class="stats">
                    <h3>📊 今日新闻统计</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${totalNews}</div>
                            <div class="stat-label">总新闻数</div>
                        </div>
                        ${categoryItems}
                    </div>
                </div>
            `;
        }

        // 渲染页面
        async function renderPage() {
            const container = document.getElementById('news-container');
            const statsContainer = document.getElementById('stats-container');
            
            try {
                const newsData = await loadNewsData();
                
                // 更新日期
                document.getElementById('current-date').textContent = newsData.date || '未知日期';
                document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN');
                
                // 显示统计信息
                statsContainer.innerHTML = createStats(newsData);
                
                // 按分类分组
                const groupedNews = groupNewsByCategory(newsData.news);
                
                // 渲染所有分类
                let html = '';
                const categoryOrder = ['宏观', 'AI', '科技', '新能源', '商业航天'];
                
                categoryOrder.forEach(category => {
                    const newsList = groupedNews[category] || [];
                    if (newsList.length > 0) {
                        html += createCategorySection(category, newsList);
                    }
                });
                
                // 如果没有新闻
                if (html === '') {
                    html = `
                        <div class="error">
                            <h3>⚠️ 暂无新闻数据</h3>
                            <p>news.json文件中没有找到新闻数据。</p>
                            <p>请检查news.json文件格式。</p>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
                
            } catch (error) {
                console.error('渲染错误详情:', error);
                container.innerHTML = `
                    <div class="error">
                        <h3>❌ 加载新闻数据失败</h3>
                        <p>错误信息: ${error.message}</p>
                        <p>请确保 news.json 文件存在且格式正确。</p>
                        <p>检查控制台获取更多信息。</p>
                    </div>
                `;
            }
        }

        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', renderPage);
        
        // 添加错误处理
        window.addEventListener('error', function(event) {
            console.error('页面JavaScript错误:', event.error);
        });
    </script>
</body>
</html>
