<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日新闻简报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        
        .date {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .category-section {
            margin-bottom: 50px;
        }
        
        .category-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid;
            position: relative;
        }
        
        .category-macro .category-title { border-color: #3498db; }
        .category-ai .category-title { border-color: #9b59b6; }
        .category-tech .category-title { border-color: #2ecc71; }
        .category-energy .category-title { border-color: #f39c12; }
        .category-space .category-title { border-color: #e74c3c; }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .news-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
            position: relative;
            overflow: hidden;
        }
        
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }
        
        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
        }
        
        .category-macro .news-card::before { background: #3498db; }
        .category-ai .news-card::before { background: #9b59b6; }
        .category-tech .news-card::before { background: #2ecc71; }
        .category-energy .news-card::before { background: #f39c12; }
        .category-space .news-card::before { background: #e74c3c; }
        
        .news-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .news-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .news-title a:hover {
            color: #3498db;
        }
        
        .news-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #6c757d;
        }
        
        .news-time, .news-source {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .news-time::before {
            content: '🕒';
            font-size: 0.9em;
        }
        
        .news-source::before {
            content: '📰';
            font-size: 0.9em;
        }
        
        .category-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .category-macro .category-tag { background: #e3f2fd; color: #1565c0; }
        .category-ai .category-tag { background: #f3e5f5; color: #7b1fa2; }
        .category-tech .category-tag { background: #e8f5e9; color: #2e7d32; }
        .category-energy .category-tag { background: #fff3e0; color: #ef6c00; }
        .category-space .category-tag { background: #ffebee; color: #c62828; }
        
        .news-summary {
            color: #495057;
            margin-bottom: 20px;
            line-height: 1.7;
            font-size: 0.95rem;
        }
        
        .news-focus {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        
        .news-focus strong {
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
        }
        
        .news-link {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .news-link:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        
        .news-link::after {
            content: ' ↗';
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #6c757d;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
            background: #ffebee;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #6c757d;
            font-size: 0.9rem;
            border-top: 1px solid #e9ecef;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .news-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .news-card {
                padding: 20px;
            }
            
            .category-title {
                font-size: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .header {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .date {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📰 每日新闻简报</h1>
        <div class="date" id="current-date">加载中...</div>
    </div>

    <div id="news-container">
        <div class="loading">正在加载新闻数据...</div>
    </div>

    <div class="footer">
        <p>数据来源：权威新闻媒体 | 更新时间：<span id="update-time">-</span></p>
        <p>© 2026 每日新闻简报 | 双击 index.html 即可查看</p>
    </div>

    <script>
        // 从 news.json 加载数据
        async function loadNewsData() {
            try {
                const response = await fetch('news.json');
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('加载新闻数据失败:', error);
                throw error;
            }
        }

        // 按分类分组新闻
        function groupNewsByCategory(newsArray) {
            const categories = {
                '宏观': [],
                'AI': [],
                '科技': [],
                '新能源': [],
                '商业航天': []
            };
            
            newsArray.forEach(news => {
                const category = news.category;
                if (categories[category]) {
                    categories[category].push(news);
                }
            });
            
            return categories;
        }

        // 创建新闻卡片
        function createNewsCard(news) {
            return `
                <div class="news-card">
                    <h3 class="news-title">
                        <a href="${news.url}" target="_blank" rel="noopener noreferrer">
                            ${news.title}
                        </a>
                    </h3>
                    
                    <div class="news-meta">
                        <span class="news-time">${news.time}</span>
                        <span class="news-source">${news.source}</span>
                        <span class="category-tag">${news.category}</span>
                    </div>
                    
                    <div class="news-summary">
                        ${news.summary}
                    </div>
                    
                    <div class="news-focus">
                        <strong>📌 关注点</strong>
                        ${news.focus}
                    </div>
                    
                    <a href="${news.url}" class="news-link" target="_blank" rel="noopener noreferrer">
                        阅读原文
                    </a>
                </div>
            `;
        }

        // 创建分类区块
        function createCategorySection(categoryName, newsArray) {
            if (newsArray.length === 0) return '';
            
            const categoryClass = {
                '宏观': 'category-macro',
                'AI': 'category-ai',
                '科技': 'category-tech',
                '新能源': 'category-energy',
                '商业航天': 'category-space'
            }[categoryName] || '';
            
            const newsCards = newsArray.map(news => createNewsCard(news)).join('');
            
            return `
                <div class="category-section ${categoryClass}">
                    <h2 class="category-title">${categoryName}</h2>
                    <div class="news-grid">
                        ${newsCards}
                    </div>
                </div>
            `;
        }

        // 渲染页面
        async function renderPage() {
            const container = document.getElementById('news-container');
            
            try {
                const newsData = await loadNewsData();
                
                // 更新日期
                document.getElementById('current-date').textContent = newsData.date;
                document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN');
                
                // 按分类分组
                const groupedNews = groupNewsByCategory(newsData.news);
                
                // 渲染所有分类
                let html = '';
                const categoryOrder = ['宏观', 'AI', '科技', '新能源', '商业航天'];
                
                categoryOrder.forEach(category => {
                    html += createCategorySection(category, groupedNews[category] || []);
                });
                
                container.innerHTML = html;
                
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <h3>❌ 加载新闻数据失败</h3>
                        <p>错误信息: ${error.message}</p>
                        <p>请确保 news.json 文件存在且格式正确。</p>
                        <p>检查控制台获取更多信息。</p>
                    </div>
                `;
            }
        }

        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', renderPage);
        
        // 添加简单的错误处理
        window.addEventListener('error', function(event) {
            console.error('页面错误:', event.error);
        });
    </script>
</body>
</html>
